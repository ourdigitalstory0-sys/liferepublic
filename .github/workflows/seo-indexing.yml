name: SEO & Search Indexing

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches:
      - main
    paths:
      - 'src/data/**'
      - 'scripts/**'

jobs:
  indexing:
    name: SEO & Supabase Indexing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build & Generate Sitemap
        # The build script runs `generate-sitemap.ts` which creates public/sitemap.xml
        run: npm run build
        
      - name: Run Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT" ]; then
            echo "$GOOGLE_SERVICE_ACCOUNT" > service-account.json
            npm run index
          else
            echo "Skipping Google Indexing: GOOGLE_SERVICE_ACCOUNT secret not found in repository settings."
          fi
          
      - name: Run Supabase Search Indexing
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -n "$VITE_SUPABASE_URL" ] && [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            npx tsx scripts/sync_to_supabase.ts
          else
            echo "Skipping Supabase Sync: Supabase credentials not found in secrets."
          fi
